<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL - BBG</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000000; --bloomberg: #ff9900; --bloomberg-dim: #cc7a00; --green: #00ff00; --red: #ff0000; --border: #331a00; --highlight: #1a0d00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--bloomberg); font-size: 11px; height: 100vh; overflow: hidden; }
        .topbar { background: var(--bloomberg); color: black; padding: 4px 6px; display: flex; justify-content: space-between; font-weight: bold; font-size: 10px; }
        .layout { display: grid; grid-template-columns: 160px 1fr 300px; height: calc(100vh - 24px); }
        .panel { background: var(--bg); border: 1px solid var(--border); margin: 1px; padding: 4px; overflow: hidden; }
        .panel-title { background: var(--bloomberg); color: black; padding: 2px 6px; font-weight: bold; font-size: 10px; margin: -4px -4px 4px -4px; }
        .sidebar { font-size: 10px; }
        .menu-item { padding: 4px 8px; display: flex; justify-content: space-between; }
        .menu-key { color: var(--bloomberg-dim); font-size: 9px; }
        .search-bar { display: flex; gap: 4px; margin-bottom: 6px; }
        .search-input { background: var(--bg); border: 1px solid var(--bloomberg-dim); color: var(--bloomberg); padding: 3px 6px; font-family: inherit; font-size: 10px; width: 100%; }
        .search-input:focus { outline: none; border-color: var(--bloomberg); }
        .ticker { display: flex; gap: 20px; overflow-x: auto; padding: 4px 0; }
        .ticker-item { white-space: nowrap; cursor: pointer; font-size: 10px; }
        .ticker-item:hover { color: #ffcc00; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        th { text-align: left; padding: 3px 6px; border-bottom: 1px solid var(--bloomberg-dim); color: var(--bloomberg-dim); }
        td { padding: 3px 6px; border-bottom: 1px solid #1a0d00; cursor: pointer; }
        td:hover { background: var(--highlight); }
        .num { text-align: right; }
        .pos { color: var(--green); }
        .neg { color: var(--red); }
        .badge { font-size: 8px; padding: 1px 4px; border-radius: 2px; margin-left: 4px; }
        .badge-crypto { background: #330066; }
        .badge-us { background: #003366; }
        .badge-hk { background: #660000; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #0d0d0d; border: 2px solid var(--bloomberg); width: 90%; max-width: 900px; max-height: 90vh; overflow: auto; }
        .modal-header { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--bloomberg); }
        .modal-close { cursor: pointer; font-size: 18px; }
        .chart-container { padding: 12px; height: 300px; }
        .chart-controls { display: flex; gap: 8px; margin-bottom: 12px; }
        .chart-btn { background: var(--bg); border: 1px solid var(--bloomberg-dim); color: var(--bloomberg); padding: 4px 12px; cursor: pointer; font-family: inherit; font-size: 10px; }
        .chart-btn:hover, .chart-btn.active { background: var(--bloomberg); color: black; }
        .detail-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; font-size: 10px; margin-top: 12px; }
        .stat { padding: 4px; background: var(--bg); }
        .stat-label { color: var(--bloomberg-dim); font-size: 9px; }
        .status { display: flex; justify-content: space-between; padding: 2px 6px; font-size: 9px; color: var(--bloomberg-dim); }
        .live-indicator { display: inline-block; width: 6px; height: 6px; background: var(--green); border-radius: 50%; margin-right: 4px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        .news-item { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 10px; cursor: pointer; }
        .news-item:hover { background: var(--highlight); }
        .news-headline { margin-bottom: 2px; }
        .news-meta { font-size: 9px; color: var(--bloomberg-dim); }
        .news-source { color: var(--bloomberg); }
    </style>
</head>
<body>
    <div class="topbar">
        <span>◇ TERMINAL &lt;GO&gt;</span>
        <span id="connection"><span class="live-indicator"></span>CONNECT</span>
    </div>
    
    <div class="layout">
        <div class="panel sidebar">
            <div class="panel-title">MENU</div>
            <div class="menu-item"><span>1 WATCHLIST</span><span class="menu-key">W</span></div>
            <div class="menu-item"><span>2 NEWS</span><span class="menu-key">N</span></div>
            <div class="menu-item"><span>3 PORTFOLIO</span><span class="menu-key">P</span></div>
        </div>
        
        <div class="panel" style="display: flex; flex-direction: column;">
            <div class="panel-title">SEARCH &lt;GO&gt;</div>
            <div class="search-bar">
                <input type="text" class="search-input" id="search" placeholder="TYPE SYMBOL..." onkeyup="searchSecurities(this.value)">
                <button onclick="fetchLiveData()" class="chart-btn">↻</button>
            </div>
            
            <div class="panel-title" style="margin-top: 4px;">MARKET TICKER <span id="last-update" style="float: right; font-weight: normal;"></span></div>
            <div class="ticker" id="ticker"></div>
            
            <div class="panel-title" style="margin-top: 4px;">SECURITIES</div>
            <table style="flex: 1;">
                <thead><tr><th>Symbol</th><th>Name</th><th class="num">Last</th><th class="num">%</th><th class="num">High</th><th class="num">Low</th></tr></thead>
                <tbody id="securities"></tbody>
            </table>
        </div>
        
        <div class="panel">
            <div class="panel-title">QUOTE &lt;GO&gt;</div>
            <div id="detail-symbol" style="font-size: 16px; font-weight: bold;">---</div>
            <div id="detail-name" style="color: var(--bloomberg-dim); font-size: 9px;">---</div>
            <div id="detail-price" style="font-size: 24px; font-weight: bold; margin: 6px 0;">---</div>
            <div id="detail-change" class="pos">---</div>
            <button class="chart-btn" style="width: 100%; margin: 8px 0;" onclick="showChart()">📈 VIEW CHART</button>
            
            <div class="detail-stats">
                <div class="stat"><div class="stat-label">OPEN</div><div id="stat-open">---</div></div>
                <div class="stat"><div class="stat-label">HIGH</div><div id="stat-high">---</div></div>
                <div class="stat"><div class="stat-label">LOW</div><div id="stat-low">---</div></div>
                <div class="stat"><div class="stat-label">MKT CAP</div><div id="stat-cap">---</div></div>
                <div class="stat"><div class="stat-label">P/E</div><div id="stat-pe">---</div></div>
                <div class="stat"><div class="stat-label">VOL</div><div id="stat-vol">---</div></div>
            </div>
            
            <div class="panel-title" style="margin-top: 8px;">LIVE NEWS <span id="news-status" style="float: right; font-weight: normal; font-size: 9px;"></span></div>
            <div id="news-feed" style="max-height: 150px; overflow-y: auto;"></div>
        </div>
    </div>
    
    <div class="status">
        <span>F1 HELP  F2 QUOTE  F3 NEWS  F4 CHRT  F5 ORDR</span>
        <span id="time">--:--:--</span>
    </div>
    
    <div class="modal" id="chartModal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="chart-title" style="font-weight: bold;">CHART</span>
                <span class="modal-close" onclick="closeChart()">×</span>
            </div>
            <div class="chart-container">
                <div class="chart-controls">
                    <button class="chart-btn active" onclick="setTimeframe('1D')">1D</button>
                    <button class="chart-btn" onclick="setTimeframe('1W')">1W</button>
                    <button class="chart-btn" onclick="setTimeframe('1M')">1M</button>
                </div>
                <canvas id="priceChart"></canvas>
            </div>
        </div>
    </div>
    
    <script>
        let securities = [];
        let chart = null;
        let currentSymbol = 'BTC';
        
        // Free news API (CryptoCompare - no key needed for basic use)
        const NEWS_API = 'https://min-api.cryptocompare.com/data/v2/news/?lang=EN';
        
        const initialData = {
            'BTC': { s: 'BTC', n: 'BITCOIN', p: 0, c: 0, h: 0, l: 0, o: 0, type: 'crypto' },
            'ETH': { s: 'ETH', n: 'ETHEREUM', p: 0, c: 0, h: 0, l: 0, o: 0, type: 'crypto' },
            'SOL': { s: 'SOL', n: 'SOLANA', p: 0, c: 0, h: 0, l: 0, o: 0, type: 'crypto' },
            'BNB': { s: 'BNB', n: 'BINANCE', p: 0, c: 0, h: 0, l: 0, o: 0, type: 'crypto' },
            'XRP': { s: 'XRP', n: 'XRP', p: 0, c: 0, h: 0, l: 0, o: 0, type: 'crypto' },
            'ADA': { s: 'ADA', n: 'CARDANO', p: 0, c: 0, h: 0, l: 0, o: 0, type: 'crypto' },
            'DOGE': { s: 'DOGE', n: 'DOGECOIN', p: 0, c: 0, h: 0, l: 0, o: 0, type: 'crypto' },
            'AAPL': { s: 'AAPL', n: 'APPLE INC', p: 189.45, c: 0.65, h: 190.20, l: 187.80, o: 188.50, mc: '2.95T', pe: 28.5, type: 'us' },
            'NVDA': { s: 'NVDA', n: 'NVIDIA CORP', p: 892.40, c: 2.34, h: 898.50, l: 870.00, o: 875.00, mc: '2.20T', pe: 65.2, type: 'us' },
            'MSFT': { s: 'MSFT', n: 'MICROSOFT', p: 415.20, c: 1.12, h: 417.80, l: 408.20, o: 410.50, mc: '3.09T', pe: 35.8, type: 'us' },
            'GOOGL': { s: 'GOOGL', n: 'ALPHABET', p: 175.80, c: -0.45, h: 178.20, l: 174.80, o: 176.50, mc: '2.18T', pe: 24.5, type: 'us' },
            'AMZN': { s: 'AMZN', n: 'AMAZON', p: 228.50, c: 1.45, h: 230.50, l: 223.80, o: 225.00, mc: '2.37T', pe: 62.3, type: 'us' },
            'META': { s: 'META', n: 'META PLATFORMS', p: 592.30, c: 2.10, h: 595.50, l: 575.20, o: 580.00, mc: '1.52T', pe: 32.8, type: 'us' },
            'TSLA': { s: 'TSLA', n: 'TESLA', p: 245.60, c: -2.12, h: 252.30, l: 243.50, o: 250.00, mc: '780B', pe: 78.5, type: 'us' },
            'AMD': { s: 'AMD', n: 'AMD INC', p: 178.90, c: 0.78, h: 181.20, l: 176.80, o: 177.50, mc: '289B', pe: 280.5, type: 'us' },
            '0700.HK': { s: '0700.HK', n: 'TENCENT', p: 385.20, c: -1.12, h: 390.00, l: 383.20, o: 388.50, mc: '3.6T', pe: 18.2, type: 'hk' },
            '9988.HK': { s: '9988.HK', n: 'ALIBABA', p: 142.50, c: 0.34, h: 144.50, l: 141.20, o: 142.00, mc: '1.8T', pe: 22.5, type: 'hk' },
        };
        
        const coinGeckoIds = { 'BTC': 'bitcoin', 'ETH': 'ethereum', 'SOL': 'solana', 'BNB': 'binancecoin', 'XRP': 'ripple', 'ADA': 'cardano', 'DOGE': 'dogecoin' };
        
        async function fetchLiveData() {
            document.getElementById('last-update').innerText = 'Loading...';
            
            // Fetch crypto from CoinGecko
            try {
                const ids = Object.values(coinGeckoIds).join(',');
                const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
                const data = await res.json();
                
                for (const [sym, geckoId] of Object.entries(coinGeckoIds)) {
                    if (data[geckoId]) {
                        initialData[sym].p = data[geckoId].usd;
                        initialData[sym].c = data[geckoId].usd_24h_change || 0;
                        initialData[sym].h = data[geckoId].usd * 1.02;
                        initialData[sym].l = data[geckoId].usd * 0.98;
                        initialData[sym].o = data[geckoId].usd * 0.99;
                    }
                }
            } catch (e) { console.log('Crypto error:', e); }
            
            securities = Object.values(initialData);
            renderTable();
            
            document.getElementById('last-update').innerText = 'Updated: ' + new Date().toLocaleTimeString();
            document.getElementById('connection').innerHTML = '<span class="live-indicator"></span>LIVE';
        }
        
        // REAL NEWS from CryptoCompare API
        async function fetchNews() {
            document.getElementById('news-status').innerText = 'Loading...';
            
            try {
                const res = await fetch(NEWS_API);
                const data = await res.json();
                
                if (data.Data) {
                    const news = data.Data.slice(0, 15);
                    document.getElementById('news-feed').innerHTML = news.map(n => `
                        <div class="news-item" onclick="window.open('${n.url}', '_blank')">
                            <div class="news-headline">${n.title}</div>
                            <div class="news-meta">
                                <span class="news-source">${n.source_info.name}</span> · ${getTimeAgo(n.published_on)}
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('news-status').innerText = 'LIVE';
                }
            } catch (e) {
                console.log('News error:', e);
                document.getElementById('news-feed').innerHTML = '<div style="color: var(--bloomberg-dim); font-size: 10px;">Unable to load news</div>';
            }
        }
        
        function getTimeAgo(timestamp) {
            const seconds = Math.floor(Date.now() / 1000) - timestamp;
            if (seconds < 60) return seconds + 's ago';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
            return Math.floor(seconds / 86400) + 'd ago';
        }
        
        function fmtP(p) { return p >= 1 ? p.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : p.toFixed(4); }
        function fmtC(c) { return (c >= 0 ? '+' : '') + (c || 0).toFixed(2) + '%'; }
        
        function getBadge(type) {
            if (type === 'us') return '<span class="badge badge-us">US</span>';
            if (type === 'hk') return '<span class="badge badge-hk">HK</span>';
            if (type === 'crypto') return '<span class="badge badge-crypto">CRYPTO</span>';
            return '';
        }
        
        function renderTable(data = securities) {
            document.getElementById('ticker').innerHTML = data.slice(0,10).map(d => 
                `<span class="ticker-item" onclick="select('${d.s}')"><b>${d.s}</b> $${fmtP(d.p)} <span class="${d.c >= 0 ? 'pos' : 'neg'}">${fmtC(d.c)}</span></span>`
            ).join('');
            
            document.getElementById('securities').innerHTML = data.map(d => `
                <tr onclick="select('${d.s}')">
                    <td><b>${d.s}</b> ${getBadge(d.type)}</td>
                    <td>${d.n}</td>
                    <td class="num">$${fmtP(d.p)}</td>
                    <td class="num ${d.c >= 0 ? 'pos' : 'neg'}">${fmtC(d.c)}</td>
                    <td class="num">$${fmtP(d.h)}</td>
                    <td class="num">$${fmtP(d.l)}</td>
                </tr>
            `).join('');
        }
        
        function select(sym) {
            currentSymbol = sym;
            const d = securities.find(x => x.s === sym);
            if (!d) return;
            
            document.getElementById('detail-symbol').innerHTML = `${d.s} ${getBadge(d.type)}`;
            document.getElementById('detail-name').innerText = d.n;
            document.getElementById('detail-price').innerText = d.p ? '$' + fmtP(d.p) : '---';
            
            const chg = document.getElementById('detail-change');
            chg.innerText = d.c ? fmtC(d.c) : '---';
            chg.className = d.c >= 0 ? 'pos' : 'neg';
            
            document.getElementById('stat-open').innerText = d.o ? '$' + fmtP(d.o) : '---';
            document.getElementById('stat-high').innerText = d.h ? '$' + fmtP(d.h) : '---';
            document.getElementById('stat-low').innerText = d.l ? '$' + fmtP(d.l) : '---';
            document.getElementById('stat-cap').innerText = d.mc || '---';
            document.getElementById('stat-pe').innerText = d.pe || '---';
            document.getElementById('stat-vol').innerText = d.v || '---';
        }
        
        function searchSecurities(query) {
            query = query.toUpperCase();
            if (!query) { renderTable(); return; }
            const filtered = securities.filter(s => s.s.includes(query) || s.n.toUpperCase().includes(query));
            renderTable(filtered);
        }
        
        function showChart() {
            const d = securities.find(x => x.s === currentSymbol);
            if (!d) return;
            document.getElementById('chart-title').innerText = d.s + ' - ' + d.n;
            renderChart(d.p || 100);
            document.getElementById('chartModal').classList.add('active');
        }
        
        function closeChart() { document.getElementById('chartModal').classList.remove('active'); }
        
        function setTimeframe(tf) {
            document.querySelectorAll('.chart-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const d = securities.find(x => x.s === currentSymbol);
            if (d) renderChart(d.p || 100);
        }
        
        function renderChart(basePrice) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const data = [];
            let price = basePrice * 0.95;
            for (let i = 0; i < 50; i++) {
                price = price + (Math.random() - 0.48) * (basePrice * 0.02);
                data.push(price);
            }
            data[data.length - 1] = basePrice;
            
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map((_, i) => i),
                    datasets: [{ label: 'Price', data: data, borderColor: '#ff9900', backgroundColor: 'rgba(255,153,0,0.1)', fill: true, tension: 0.4, pointRadius: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#331a00' }, ticks: { color: '#cc7a00' } } } }
            });
        }
        
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeChart(); });
        
        function updateTime() {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('en-US', { hour12: false }) + ' HKT';
        }
        
        securities = Object.values(initialData);
        renderTable();
        select('BTC');
        updateTime();
        setInterval(updateTime, 1000);
        
        fetchLiveData();
        fetchNews();
        setInterval(fetchLiveData, 30000);
        setInterval(fetchNews, 60000);
    </script>
</body>
</html>
